services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sabiscore}
      POSTGRES_USER: ${POSTGRES_USER:-sabi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sabiscore_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sabi} -d ${POSTGRES_DB:-sabiscore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://sabi:sabiscore_dev_password@postgres:5432/sabiscore}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-development-only-change-before-production}
      PROVIDER_LIVE_TESTS: ${PROVIDER_LIVE_TESTS:-false}
      ENABLE_ESPN_PROVIDER: ${ENABLE_ESPN_PROVIDER:-true}
      ENABLE_FOOTBALL_DATA_PROVIDER: ${ENABLE_FOOTBALL_DATA_PROVIDER:-false}
      ENABLE_API_FOOTBALL_PROVIDER: ${ENABLE_API_FOOTBALL_PROVIDER:-false}
      ENABLE_SPORTMONKS_PROVIDER: ${ENABLE_SPORTMONKS_PROVIDER:-false}
      ENABLE_THE_ODDS_API_PROVIDER: ${ENABLE_THE_ODDS_API_PROVIDER:-false}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      SPORTMONKS_API_KEY: ${SPORTMONKS_API_KEY:-}
      THE_ODDS_API_KEY: ${THE_ODDS_API_KEY:-}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./models:/app/models:ro
      - ./backend/models:/app/backend/models:ro
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      SABISCORE_BACKEND_URL: ${SABISCORE_BACKEND_URL:-http://backend:8000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  scraper:
    image: node:22-alpine
    profiles: ["scraper"]
    working_dir: /workspace
    command: ["sh", "-lc", "corepack enable && pnpm --filter @sabiscore/scraper doctor"]
    volumes:
      - .:/workspace
    environment:
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
