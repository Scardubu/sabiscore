name: CI - Canonical Platform

on:
  push:
    branches: [master, main, develop, "feat/**"]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_EXTRA_ARGS: "--redact --verbose"

  backend-quality:
    name: Backend Lint, Typecheck, Tests
    runs-on: ubuntu-latest
    needs: security
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: sabiscore_test
          POSTGRES_USER: sabi
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sabi -d sabiscore_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DATABASE_URL: postgresql://sabi:test_password@localhost:5432/sabiscore_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-ci-only-please-rotate
      PROVIDER_LIVE_TESTS: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff before tests
        working-directory: backend
        run: ruff check src tests

      - name: MyPy before tests
        working-directory: backend
        run: mypy --config-file mypy-production.ini

      - name: Alembic upgrade
        working-directory: backend
        run: alembic upgrade head

      - name: Backend tests
        working-directory: backend
        run: pytest tests -q --no-cov

  web-quality:
    name: Web Lint, Typecheck, Build
    runs-on: ubuntu-latest
    needs: security
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      SABISCORE_BACKEND_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web
        run: pnpm --filter @sabiscore/web lint

      - name: Typecheck web
        run: pnpm --filter @sabiscore/web typecheck

      - name: Test web
        run: pnpm --filter @sabiscore/web test

      - name: Build web
        run: pnpm --filter @sabiscore/web build
