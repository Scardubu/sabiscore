name: CI - Canonical Platform

on:
  push:
    branches: [main, master, develop, "feat/**"]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_EXTRA_ARGS: "--redact --verbose"

  backend-quality:
    name: Backend Lint, Typecheck, Tests
    runs-on: ubuntu-latest
    needs: security
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: sabiscore_test
          POSTGRES_USER: sabi
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sabi -d sabiscore_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DATABASE_URL: postgresql://sabi:test_password@localhost:5432/sabiscore_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-ci-only-please-rotate
      PROVIDER_LIVE_TESTS: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff before tests
        working-directory: backend
        run: ruff check src tests

      - name: MyPy (advisory — type-debt burndown pending)
        working-directory: backend
        # Non-blocking: the codebase carries ~540 legacy type errors across 89 files
        # (SQLAlchemy Column typing, FastAPI internals, untyped data/ML surfaces).
        # A blocking `mypy src` here aborts the job before the steps below ever run —
        # silently skipping the 942-test suite, alembic drift check, and zero-fab scan.
        # Kept visible as advisory (full report stays in the log) until type-debt is
        # burned down file-by-file. Do NOT convert to `|| true` — that discards output.
        continue-on-error: true
        run: mypy src

      - name: Alembic upgrade
        working-directory: backend
        run: alembic upgrade head

      - name: Alembic schema drift check
        working-directory: backend
        run: alembic check

      - name: Zero-fabrication scan
        working-directory: backend
        shell: bash
        run: |
          ! grep -rn "FEATURE_DEFAULTS\[" src/services src/api src/insights --include="*.py"
          ! grep -rn "FEATURE_DEFAULTS\[" src/data/transformers.py
          ! grep -rn "hardcoded_odds" src/services src/api src/providers --include="*.py"
          ! grep -rn "Base\.metadata\.create_all" alembic --include="*.py"
          ! grep -rn "full_kelly_fraction" src --include="*.py"
          # datetime.utcnow() deprecated (Python 3.12+): now clean across ALL of src.
          # database.py SQLAlchemy column callable defaults are exempt (requires SQLAlchemy migration).
          ! grep -rn "datetime\.utcnow" src --include="*.py" --exclude="database.py"
          cd ..
          ! grep -rn "full_kelly\|Full-Kelly\|Full Kelly" apps/web/src --include="*.ts" --include="*.tsx"
          ! grep -rn "NEXT_PUBLIC_KELLY_FRACTION" vercel.json .env.example backend/.env.example 2>/dev/null

      - name: Backend tests
        working-directory: backend
        run: pytest tests -q --no-cov

  web-quality:
    name: Web Lint, Typecheck, Build
    runs-on: ubuntu-latest
    needs: security
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      SABISCORE_BACKEND_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web
        run: pnpm --filter @sabiscore/web lint

      - name: Typecheck web
        run: pnpm --filter @sabiscore/web typecheck

      - name: Test web
        run: pnpm --filter @sabiscore/web test

      - name: Build web
        run: pnpm --filter @sabiscore/web build
        env:
          NODE_ENV: production

  playwright-smoke:
    name: Playwright Smoke (backend-independent)
    runs-on: ubuntu-latest
    needs: web-quality
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      SABISCORE_BACKEND_URL: http://localhost:8000
      NODE_ENV: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @sabiscore/web build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests
        run: pnpm exec playwright test tests/e2e/intelligence.spec.ts --project=chromium --project=mobile-chrome
