name: Apply safe Ruff fixes

on:
  push:
    branches:
      - codex/final-production-certification
    paths:
      - .github/workflows/apply-ruff-safe-fixes.yml
      - .sabi-core/ruff-safe-fix-trigger

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/final-production-certification
          fetch-depth: 0
      - run: python -m pip install --quiet ruff
      - working-directory: backend
        run: ruff check src tests --fix || true
      - run: |
          rm .github/workflows/apply-ruff-safe-fixes.yml
          rm .sabi-core/ruff-safe-fix-trigger
          rmdir .sabi-core 2>/dev/null || true
          git diff --check
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(backend): apply safe Ruff fixes"
          git push origin HEAD:codex/final-production-certification
