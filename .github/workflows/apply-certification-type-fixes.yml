name: Apply certification type fixes

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/final-production-certification
          fetch-depth: 0
      - name: Apply reviewed type fixes
        run: |
          set -euo pipefail
          if [[ ! -f scripts/apply-certification-type-fixes-v2.py ]]; then
            echo "Type-fix script already consumed."
            exit 0
          fi
          python scripts/apply-certification-type-fixes-v2.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat: align v1.3 betting contract"
          git push origin HEAD:codex/final-production-certification
