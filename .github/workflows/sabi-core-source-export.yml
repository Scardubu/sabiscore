name: SABI-CORE temporary source export

on:
  pull_request:
    branches: [master]
  push:
    branches:
      - codex/final-production-certification

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package source tree
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude='**/__pycache__' \
            --exclude='**/*.pyc' \
            --exclude='**/node_modules' \
            -czf /tmp/sabiscore-source.tar.gz .

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: sabi-core-source-${{ github.sha }}
          path: /tmp/sabiscore-source.tar.gz
          if-no-files-found: error
          retention-days: 1
