name: Apply runtime contract alignment

on:
  push:
    branches: [codex/final-production-certification]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/final-production-certification
          fetch-depth: 0
      - name: Apply reviewed runtime contract patch
        run: |
          set -euo pipefail
          test -f scripts/apply-runtime-contract-alignment.py
          python scripts/apply-runtime-contract-alignment.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: align runtime with provider and staking contracts"
          git push origin HEAD:codex/final-production-certification
