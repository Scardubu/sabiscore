name: Apply certification workspace

on:
  push:
    branches: [codex/final-production-certification]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'pull_request' || github.ref_name == 'codex/final-production-certification'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/final-production-certification
          fetch-depth: 0

      - name: Apply reviewed certification files
        run: |
          set -euo pipefail
          cat .certification/parts/*.b64 | base64 --decode > /tmp/certification-files.tgz
          echo "ff1f7e588cab0c095a7d57f040c3c98c03b76e40bc7fddd18d64d85a7b472ea7  /tmp/certification-files.tgz" | sha256sum -c -
          tar -xzf /tmp/certification-files.tgz
          rm -rf .certification
          rm -f .github/workflows/apply-certification-workspace.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat: complete production certification workflow"
          git push origin HEAD:codex/final-production-certification
