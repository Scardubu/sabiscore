name: Apply certification workspace

on:
  push:
    branches: [codex/final-production-certification]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'pull_request' || github.ref_name == 'codex/final-production-certification'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/final-production-certification
          fetch-depth: 0

      - name: Reconstruct certification archive
        run: |
          set -euo pipefail
          cat .certification/parts/part-*.b64 | base64 --decode > /tmp/certification-files.tgz
          test -s /tmp/certification-files.tgz
          ls -lh /tmp/certification-files.tgz

      - name: Verify certification archive checksum
        run: |
          set -euo pipefail
          actual="$(sha256sum /tmp/certification-files.tgz | cut -d' ' -f1)"
          echo "actual=$actual"
          test "$actual" = "ff1f7e588cab0c095a7d57f040c3c98c03b76e40bc7fddd18d64d85a7b472ea7"

      - name: Extract reviewed source files
        run: |
          set -euo pipefail
          tar -tzf /tmp/certification-files.tgz
          tar -xzf /tmp/certification-files.tgz
          test -f backend/tests/test_web_security_config.py
          test -f .github/workflows/production-certification.yml
          rm -rf .certification
          rm -f .github/workflows/apply-certification-workspace.yml

      - name: Commit and push reviewed source files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat: complete production certification workflow"
          git push origin HEAD:codex/final-production-certification
