name: Apply zero-fabrication hardening

on:
  push:
    branches: [codex/final-production-certification]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/final-production-certification
          fetch-depth: 0
      - name: Apply reviewed hardening patch
        run: |
          set -euo pipefail
          test -f scripts/apply-zero-fabrication-hardening.py
          python scripts/apply-zero-fabrication-hardening.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: enforce zero-fabrication inference contract"
          git push origin HEAD:codex/final-production-certification
