name: Validate Skill Suite

on:
  push:
    branches: [main, develop]
    paths:
      - 'registry.json'
      - 'registry.schema.json'
      - '.ai/skills/**'
      - '.claude/skills/**'
      - '.claude/settings.json'
      - '.mcp.json'
      - 'install.sh'
      - 'Makefile'
      - '.github/workflows/validate.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'registry.json'
      - 'registry.schema.json'
      - '.ai/skills/**'
      - '.claude/skills/**'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Schema Validation ─────────────────────────────────────────────────
  validate-registry:
    name: Validate registry.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install ajv-cli
        run: npm install -g ajv-cli@5 ajv-formats@3

      - name: Validate registry.json against schema
        run: |
          ajv validate \
            --spec=draft2020 \
            -s registry.schema.json \
            -d registry.json \
            --all-errors
        # Exits non-zero on any validation error — blocks merge

      - name: Validate .claude/settings.json syntax
        run: |
          jq empty .claude/settings.json
          echo "✓ .claude/settings.json is valid JSON"

      - name: Validate .mcp.json syntax
        run: |
          if [[ -f ".mcp.json" ]]; then
            jq empty .mcp.json
            echo "✓ .mcp.json is valid JSON"
          else
            echo "ℹ .mcp.json not present (optional)"
          fi

      - name: Registry integrity check
        run: |
          # Count must match between declared and distinct names
          total=$(jq '.skills | length' registry.json)
          distinct=$(jq '.skills | map(.name) | unique | length' registry.json)
          if [[ "$total" != "$distinct" ]]; then
            echo "✗ Duplicate skill names in registry.json ($total declared, $distinct unique)"
            exit 1
          fi

          # Install orders must be unique
          dup_orders=$(jq '[.skills[].installOrder] | group_by(.) | map(select(length > 1)) | length' registry.json)
          if [[ "$dup_orders" -gt 0 ]]; then
            echo "✗ Duplicate installOrder values in registry.json"
            jq '[.skills[] | {name, installOrder}] | sort_by(.installOrder)' registry.json
            exit 1
          fi

          # Every skill must have ≥5 triggers
          short_triggers=$(jq '[.skills[] | select(.triggers | length < 5) | .name] | length' registry.json)
          if [[ "$short_triggers" -gt 0 ]]; then
            echo "✗ Skills with fewer than 5 triggers:"
            jq -r '.skills[] | select(.triggers | length < 5) | "\(.name): \(.triggers | length) triggers"' registry.json
            exit 1
          fi

          echo "✓ Registry integrity passed:"
          echo "  Skills: $total"
          echo "  Unique names: $distinct"
          echo "  All trigger counts ≥ 5"

      - name: Summary comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const version = execSync("jq -r '.suiteVersion' registry.json").toString().trim();
            const count   = execSync("jq '.skills | length' registry.json").toString().trim();
            const body = [
              `## ✅ Skill Suite Validation Passed`,
              ``,
              `| Field | Value |`,
              `|---|---|`,
              `| Suite Version | \`${version}\` |`,
              `| Skill Count | ${count} |`,
              `| Schema | JSON Schema 2020-12 |`,
              ``,
              `_Generated by validate.yml_`
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ── Job 2: Markdown Lint ──────────────────────────────────────────────────────
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint all Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules/**
            !.pnpm/**
            !CHANGELOG.md

  # ── Job 3: Shell Script Lint ──────────────────────────────────────────────────
  lint-shell:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          additional_files: 'install.sh'
          severity: warning
          check_together: 'yes'

  # ── Job 4: Skill File Presence ────────────────────────────────────────────────
  check-skill-files:
    name: Check skill file presence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify declared skills have SKILL.md files
        run: |
          missing=0
          while IFS= read -r path; do
            if [[ ! -f "$path" ]]; then
              echo "✗ Missing: $path"
              missing=$((missing + 1))
            else
              echo "✓ Found: $path"
            fi
          done < <(jq -r '.skills[].filePath' registry.json)

          if [[ $missing -gt 0 ]]; then
            echo ""
            echo "✗ $missing skill file(s) declared in registry.json but missing from disk"
            echo "  Create the missing files or remove them from registry.json"
            exit 1
          fi

          echo ""
          total=$(jq '.skills | length' registry.json)
          echo "✓ All $total skill files present on disk"

  # ── Job 5: Claude Code Settings Lint ─────────────────────────────────────────
  validate-claude-code:
    name: Validate Claude Code config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate all JSON config files
        run: |
          errors=0
          for f in ".claude/settings.json" ".mcp.json"; do
            if [[ -f "$f" ]]; then
              if jq empty "$f" 2>/dev/null; then
                echo "✓ $f — valid JSON"
              else
                echo "✗ $f — invalid JSON"
                errors=$((errors + 1))
              fi
            fi
          done
          if [[ $errors -gt 0 ]]; then exit 1; fi

      - name: Check for hardcoded secrets
        run: |
          # Fail if any settings files contain actual secret values (not env-var references)
          if grep -rE '"(password|secret|token|api_key|apikey)"\s*:\s*"[^$][^{]' \
               .claude/settings.json .mcp.json 2>/dev/null; then
            echo "✗ Potential hardcoded secrets found — use \${ENV_VAR} references instead"
            exit 1
          fi
          echo "✓ No hardcoded secrets detected"
