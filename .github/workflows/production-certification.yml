name: Production Certification

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-certification-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  make-verify:
    name: make verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: sabiscore_test
          POSTGRES_USER: sabi
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sabi -d sabiscore_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DEBUG: "false"
      MOCK_MODE: "false"
      ENABLE_LEGACY_INFERENCE: "false"
      ALLOW_SQLITE_FALLBACK: "false"
      DATABASE_URL: postgresql://sabi:test_password@127.0.0.1:5432/sabiscore_test
      REDIS_URL: redis://127.0.0.1:6379/0
      SECRET_KEY: ci-test-secret-not-for-production
      BACKEND_TOKEN: ci-test-token-not-for-production
      SABISCORE_BACKEND_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      PROVIDER_LIVE_TESTS: "false"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Capture canonical production gate
        id: verify
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          make verify 2>&1 | tee /tmp/make-verify.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-certification-${{ github.sha }}
          if-no-files-found: ignore
          path: |
            /tmp/make-verify.log
            backend/artifacts/openapi.json
            playwright-report/
            test-results/

      - name: Enforce canonical production gate
        if: steps.verify.outputs.status != '0'
        run: exit 1
